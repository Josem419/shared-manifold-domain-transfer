defaults:
  - _self_

model:
  ambient_dim: 1280
  manifold_dim: 256         # same capacity as pose_cond - isolates conditioning effect
  noise_dim: 1024
  n_coupling_layers: 8
  hidden_dim: 256
  pose_dim: 6
  pose_hidden_dim: 64
  cond_flow: false          # unconditional flow - ablation against mflow_pose_cond

training:
  lr: 1e-4
  batch_size: 128
  max_epochs: 100
  early_stopping_patience: 10
  val_every_n_epochs: 5
  gradient_accumulation_steps: 1
  lambda_likelihood: 0.1
  lambda_geometry: 0.01
  lambda_pose: 1.0          # same as pose_cond so probe comparison is fair
  grad_clip: 1.0

data:
  data_dir: "data/lard_20k"
  image_size: 224
  num_workers: 4

ijepa:
  weights_path: "models/IN22K-vit.h.14-900e.pth.tar"
  cache_embeddings: true
  embeddings_cache_dir: "outputs/embeddings_cache"
  d1_prebuilt_npz: "outputs/embeddings/lard_20k/d1_full.npz"
  d2_prebuilt_npz: "outputs/embeddings/lard_20k/d2_full.npz"

run:
  name: "uncond_256"

checkpoint:
  save_dir: "outputs/checkpoints/mflow_${run.name}"
  save_top_k: 3

hydra:
  run:
    dir: outputs/runs/mflow/${now:%Y-%m-%d_%H-%M-%S}

profiles:
  local:
    training:
      batch_size: 8
      max_epochs: 2
      gradient_accumulation_steps: 16
  aws:
    training:
      batch_size: 128
